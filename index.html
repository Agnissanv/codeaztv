<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code A-Z - TV</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1>Code A-Z <span>TV</span></h1>
    </header>

    <main>
        <div class="filter-container">
            <div class="filter-group">
                <label for="filter-langue">Langue :</label>
                <select id="filter-langue">
                    <option value="all">Toutes les langues</option>
                    <option value="français">Français</option>
                    <option value="anglais">Anglais</option>
                    <option value="espagnol">Espagnol</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-categorie">Catégorie :</label>
                <select id="filter-categorie">
                    <option value="all">Toutes les catégories</option>
                    <option value="sport">Sport</option>
                    <option value="info">Information</option>
                    <option value="animation">Dessins Animés</option>
                    <option value="général">Généraliste</option>
                </select>
            </div>
        </div>

        <div id="grid-chaines" class="grid-container"></div>
    </main>

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Nom de la chaîne</h2>
            <div class="video-container">
                <video id="video-player" controls autoplay></video>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
