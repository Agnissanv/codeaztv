<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code A-Z - TV</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1>Code A-Z <span>TV</span></h1>
    </header>

    <main>
        <div class="filter-container">
            <div class="filter-group">
                <label for="filter-langue">Langue :</label>
                <select id="filter-langue">
                    <option value="all">Toutes les langues</option>
                    <option value="français">Français</option>
                    <option value="anglais">Anglais</option>
                    <option value="espagnol">Espagnol</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-categorie">Catégorie :</label>
                <select id="filter-categorie">
                    <option value="all">Toutes les catégories</option>
                    <option value="information" title="Information, Nouvelles, Législatif">Information</option>
                    <option value="Sportif" title="Sport, Auto">Sportif</option>
                    <option value="Films-Série" title="Films-Série">Films & Série</option>
                    <option value="Divertissement" title="Divertissement, Comédie">Divertissement</option>
                    <option value="Musique" title="Musique">Musique</option>
                    <option value="Documentaire" title="Documentaire,  Science, Culture">Documentaire</option>
                    <option value="Éducation" title="Éducation">Éducation</option>
                    <option value="Famille" title="Famille">Famille</option>
                    <option value="Animation" title="Animation, Enfants">Animation</option>
                    <option value="Style de vie" title="Style de vie">Style de vie</option>
                    <option value="Cuisine" title="Cuisine">Cuisine</option>
                    <option value="Voyage & Plein air" title="Voyage & Plein air">Voyage & Plein air</option>
                    <option value="Religieux" title="Religieux">Religieux</option>
                    <option value="Météo" title="Météo">Météo</option>
                    <option value="Entreprise" title="Entreprise">Entreprise</option>
                    <option value="Général" title="Général">Général</option>
                    <option value="Indéfini" title="Indéfini">Indéfini</option>
                </select>
            </div>
        </div>

        <div id="grid-chaines" class="grid-container"></div>
    </main>
    <!-- Animation, auto, Entreprise, Comédie, Cuisson, Culture, Documentaire, Éducation, 
     
    Divertissement, Famille, Général, Enfants, Législatif, Style de vie, Films, Musique, 
    
    Nouvelles, De plein air, Religieux, Science, Série, Sportif, Voyage, Météo, Indéfini -->

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Nom de la chaîne</h2>
            <div class="video-container">
                <video id="video-player" controls autoplay></video>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
